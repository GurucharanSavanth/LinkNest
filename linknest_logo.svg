<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="250" y1="220" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="accent2" x1="320" y1="320" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="shadow" x="120" y="120" width="784" height="784" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <!-- App icon base -->
  <rect x="112" y="112" width="800" height="800" rx="220" fill="url(#bg)"/>
  <rect x="132" y="132" width="760" height="760" rx="200" stroke="rgba(255,255,255,0.08)" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Soft background grid / hierarchy hint -->
  <path d="M250 300H774" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.28"/>
  <path d="M250 512H774" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
  <path d="M250 724H774" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.12"/>

  <!-- Main hierarchical link mark -->
  <g filter="url(#shadow)">
    <!-- Parent folder node -->
    <rect x="222" y="240" width="240" height="176" rx="48" fill="url(#accent)"/>
    <path d="M254 292C254 274.327 268.327 260 286 260H354C367.255 260 379.967 265.268 389.34 274.66L412.68 298H430C447.673 298 462 312.327 462 330V352C462 369.673 447.673 384 430 384H254V292Z" fill="#EEF2FF" fill-opacity="0.96"/>

    <!-- Hierarchy spine -->
    <path d="M462 328H578C620 328 654 362 654 404V592" stroke="url(#accent2)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Child nodes -->
    <rect x="594" y="434" width="184" height="120" rx="36" fill="url(#accent)"/>
    <rect x="594" y="614" width="184" height="120" rx="36" fill="url(#accent)"/>

    <!-- Link glyphs inside child nodes -->
    <g opacity="0.98">
      <path d="M654 488L682 460C701 441 732 441 751 460C770 479 770 510 751 529L723 557" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M718 488L690 516C671 535 640 535 621 516C602 497 602 466 621 447L649 419" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g opacity="0.98">
      <circle cx="658" cy="674" r="18" fill="white"/>
      <circle cx="706" cy="674" r="18" fill="white" fill-opacity="0.96"/>
      <circle cx="754" cy="674" r="18" fill="white" fill-opacity="0.92"/>
    </g>
  </g>

  <!-- small spark accent -->
  <circle cx="770" cy="256" r="14" fill="#67E8F9" opacity="0.9"/>
  <circle cx="806" cy="220" r="8" fill="#C4B5FD" opacity="0.85"/>

  <!-- Optional wordmark area omitted to keep icon clean -->
</svg>
